name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check src/ tests/
      - name: Check linting
        run: ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=agentshift --cov-report=term-missing
      - name: Check coverage
        run: pytest tests/ --cov=agentshift --cov-fail-under=60

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Verify CLI entry point
        run: |
          pip install dist/*.whl
          agentshift --help

  schema-validate:
    name: Validate IR Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install jsonschema pyyaml
      - name: Validate IR schema
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          schema_path = Path('specs/ir-schema.json')
          if schema_path.exists():
              schema = json.loads(schema_path.read_text())
              print(f'IR schema valid: {len(schema)} top-level keys')
          else:
              print('IR schema not yet created — skipping')
          "
