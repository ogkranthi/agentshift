name: Bug Report
description: Report a bug in AgentShift
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: AgentShift Version
      description: Run `agentshift --version` to get this
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Which command?
      options:
        - convert
        - diff
        - validate
        - other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Which platform(s) are involved?
      multiple: true
      options:
        - OpenClaw
        - Claude Code
        - GitHub Copilot
        - AWS Bedrock
        - GCP Vertex AI
        - LangGraph
        - CrewAI
        - Other

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: When I run `agentshift convert --to copilot ./my-skill/`, it fails with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug
      value: |
        1. Create a skill with...
        2. Run `agentshift convert ...`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste the full error output
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.2 / Ubuntu 22.04 / Windows 11"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
