name: AgentShift Portability Report
description: Analyze AI agent portability across Claude Code, Copilot, Bedrock, M365, and Vertex AI
author: AgentShift (agentshift.sh)

inputs:
  github-token:
    description: GitHub token for PR comments
    required: false
    default: ${{ github.token }}
  targets:
    description: Comma-separated target platforms
    required: false
    default: claude-code,copilot,bedrock,m365,vertex
  comment-on-pr:
    description: Post report as PR comment
    required: false
    default: "true"

outputs:
  average-score:
    description: Average portability score (0-100)
    value: ${{ steps.analyze.outputs.average-score }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install AgentShift
      shell: bash
      run: pip install agentshift

    - name: Analyze agents
      id: analyze
      shell: bash
      run: python ${{ github.action_path }}/scripts/analyze.py
      env:
        TARGETS: ${{ inputs.targets }}
        GITHUB_WORKSPACE: ${{ github.workspace }}

    - name: Comment on PR
      if: github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          if (!fs.existsSync("agentshift-report.md")) { console.log("No report generated"); return; }
          const report = fs.readFileSync("agentshift-report.md", "utf8");
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
          });
          const existing = comments.data.find(c => c.body.includes("AgentShift Portability Report"));
          const method = existing ? "updateComment" : "createComment";
          await github.rest.issues[method]({
            owner: context.repo.owner, repo: context.repo.repo,
            ...(existing ? {comment_id: existing.id} : {issue_number: context.issue.number}),
            body: report
          });
