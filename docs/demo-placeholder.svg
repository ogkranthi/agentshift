<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340">
  <defs>
    <style>
      .terminal { font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace; font-size: 13px; }
      .prompt    { fill: #50fa7b; }
      .cmd       { fill: #f8f8f2; }
      .output    { fill: #6272a4; }
      .success   { fill: #50fa7b; }
      .key       { fill: #ff79c6; }
      .val       { fill: #f1fa8c; }
      .comment   { fill: #6272a4; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="700" height="340" rx="8" ry="8" fill="#282a36"/>

  <!-- Title bar -->
  <rect width="700" height="32" rx="8" ry="8" fill="#44475a"/>
  <rect width="700" height="16" y="16" fill="#44475a"/>
  <circle cx="20" cy="16" r="6" fill="#ff5555"/>
  <circle cx="40" cy="16" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="16" r="6" fill="#50fa7b"/>
  <text x="350" y="21" text-anchor="middle" fill="#f8f8f2" class="terminal" font-size="12">agentshift demo</text>

  <!-- Line 1: prompt + command -->
  <text x="20" y="64" class="terminal prompt">$</text>
  <text x="34" y="64" class="terminal cmd">agentshift convert ./weather-skill --from openclaw --to claude-code --output ./weather-claude</text>

  <!-- Line 2: success output -->
  <text x="20" y="88" class="terminal success">✓</text>
  <text x="34" y="88" class="terminal cmd">Parsed   ./weather-skill/SKILL.md</text>
  <text x="400" y="88" class="terminal comment">(openclaw)</text>

  <text x="20" y="108" class="terminal success">✓</text>
  <text x="34" y="108" class="terminal cmd">IR       identity · tools · knowledge · triggers</text>

  <text x="20" y="128" class="terminal success">✓</text>
  <text x="34" y="128" class="terminal cmd">Emitted  ./weather-claude/CLAUDE.md</text>
  <text x="400" y="128" class="terminal comment">(claude-code)</text>

  <text x="20" y="148" class="terminal success">✓</text>
  <text x="34" y="148" class="terminal cmd">Emitted  ./weather-claude/settings.json</text>

  <!-- Blank line -->

  <!-- Line 3: cat CLAUDE.md -->
  <text x="20" y="180" class="terminal prompt">$</text>
  <text x="34" y="180" class="terminal cmd">cat ./weather-claude/CLAUDE.md</text>

  <!-- CLAUDE.md output -->
  <text x="20" y="204" class="terminal key"># weather</text>

  <text x="20" y="224" class="terminal output">Get current weather and forecasts via wttr.in. No API key needed.</text>

  <text x="20" y="248" class="terminal key">## Tools</text>
  <text x="20" y="268" class="terminal cmd">- <tspan class="val">bash</tspan> (shell): Run shell commands</text>

  <!-- Line 4: settings.json -->
  <text x="20" y="300" class="terminal prompt">$</text>
  <text x="34" y="300" class="terminal cmd">cat ./weather-claude/settings.json</text>
  <text x="20" y="322" class="terminal output">{ "permissions": { "allow": ["Bash(bash:*)"] } }</text>
</svg>
